backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "settings"
    label: "Obsah Webové stránky"
    files:
      - label: "1. Úvodní sekce (Hero)"
        name: "hero"
        file: "_data/hero.json"
        fields:
          - {label: "Obrázek (Hero)", name: "image", widget: "image"}
          - {label: "Štítek", name: "tag", widget: "string"}
          - {label: "Hlavní Nadpis (podpora <br>)", name: "title", widget: "string"}
          - {label: "Zvýrazněný text (Kurzíva)", name: "highlight", widget: "string"}
          - {label: "Popis pod nadpisem", name: "description", widget: "text"}
          - {label: "Tlačítko 1 text", name: "btn1_text", widget: "string"}
          - {label: "Tlačítko 2 text", name: "btn2_text", widget: "string"}
          - {label: "Podtext tlačítek", name: "subtext", widget: "string"}
      - label: "2. O mně sekce"
        name: "about"
        file: "_data/about.json"
        fields:
          - {label: "Obrázek (O mně)", name: "image", widget: "image"}
          - {label: "Štítek", name: "tag", widget: "string"}
          - {label: "Nadpis", name: "title", widget: "string"}
          - {label: "Zvýrazněný text v nadpisu", name: "title_highlight", widget: "string"}
          - {label: "Hlavní text", name: "body", widget: "markdown"}
          - {label: "Statistika 1 Hodnota", name: "stat1_val", widget: "string"}
          - {label: "Statistika 1 Text", name: "stat1_label", widget: "string"}
          - {label: "Statistika 2 Hodnota", name: "stat2_val", widget: "string"}
          - {label: "Statistika 2 Text", name: "stat2_label", widget: "string"}
          - {label: "Statistika 3 Hodnota", name: "stat3_val", widget: "string"}
          - {label: "Statistika 3 Text", name: "stat3_label", widget: "string"}
      - label: "3. Služby"
        name: "services"
        file: "_data/services.json"
        fields:
          - {label: "Štítek", name: "tag", widget: "string"}
          - {label: "Nadpis", name: "title", widget: "string"}
          - {label: "Popis", name: "description", widget: "text"}
          - {label: "Text Tlačítka", name: "btn_text", widget: "string"}
          - label: "Seznam Služeb"
            name: "items"
            widget: "list"
            fields:
              - {label: "Ikona (lucide.dev)", name: "icon", widget: "string"}
              - {label: "Název Služby", name: "title", widget: "string"}
              - {label: "Popis Služby", name: "desc", widget: "text"}
      - label: "4. Proč si vybrat mě"
        name: "reasons"
        file: "_data/reasons.json"
        fields:
          - {label: "Štítek", name: "tag", widget: "string"}
          - {label: "Nadpis", name: "title", widget: "string"}
          - label: "Důvody"
            name: "items"
            widget: "list"
            fields:
              - {label: "Ikona", name: "icon", widget: "string"}
              - {label: "Nadpis", name: "title", widget: "string"}
              - {label: "Popis", name: "desc", widget: "text"}
      - label: "5. Jak to funguje"
        name: "process"
        file: "_data/process.json"
        fields:
          - {label: "Štítek", name: "tag", widget: "string"}
          - {label: "Nadpis", name: "title", widget: "string"}
          - label: "Kroky"
            name: "items"
            widget: "list"
            fields:
              - {label: "Číslo kroku (např. 01)", name: "number", widget: "string"}
              - {label: "Ikona", name: "icon", widget: "string"}
              - {label: "Nadpis", name: "title", widget: "string"}
              - {label: "Popis", name: "desc", widget: "text"}
      - label: "6. Recenze"
        name: "testimonials"
        file: "_data/testimonials.json"
        fields:
          - {label: "Štítek", name: "tag", widget: "string"}
          - {label: "Nadpis", name: "title", widget: "string"}
          - label: "Jednotlivé Recenze"
            name: "items"
            widget: "list"
            fields:
              - {label: "Text recenze", name: "text", widget: "text"}
              - {label: "Jméno", name: "name", widget: "string"}
              - {label: "Popisek služby", name: "service", widget: "string"}
      - label: "7. Odkaz a Kontakt"
        name: "cta"
        file: "_data/cta.json"
        fields:
          - {label: "Obrázek (Kontakt)", name: "image", widget: "image"}
          - {label: "Štítek", name: "tag", widget: "string"}
          - {label: "Nadpis", name: "title", widget: "string"}
          - {label: "Zvýraznění", name: "title_highlight", widget: "string"}
          - {label: "Popisek", name: "description", widget: "text"}
          - {label: "Instagram - Nadpis", name: "instagram_label", widget: "string"}
          - {label: "Instagram - Profil", name: "instagram_value", widget: "string"}
          - {label: "Instagram - Odkaz", name: "instagram_link", widget: "string"}
          - {label: "Email - Nadpis", name: "email_label", widget: "string"}
          - {label: "Email - E-mailová adresa", name: "email_value", widget: "string"}
          - {label: "Telefon - Nadpis", name: "phone_label", widget: "string"}
          - {label: "Telefon - Číslo", name: "phone_value", widget: "string"}
      - label: "8. Instagram Fotky"
        name: "instagram"
        file: "_data/instagram.json"
        fields:
          - {label: "Štítek", name: "tag", widget: "string"}
          - {label: "Nadpis", name: "title", widget: "string"}
          - {label: "Popis", name: "description", widget: "string"}
          - {label: "Tlačítko - text", name: "btn_text", widget: "string"}
          - {label: "Tlačítko - odkaz", name: "btn_link", widget: "string"}
          - label: "Fotky"
            name: "items"
            widget: "list"
            fields:
              - {label: "Obrázek - náhled", name: "image", widget: "image"}
              - {label: "Odkaz na příspěvek", name: "link", widget: "string"}
              - {label: "Alternativní text (SEO)", name: "alt", widget: "string"}
      - label: "9. Patička (Footer)"
        name: "footer"
        file: "_data/footer.json"
        fields:
          - {label: "Jméno v logu", name: "name", widget: "string"}
          - {label: "Instagram text", name: "instagram_label", widget: "string"}
          - {label: "Instagram odkaz", name: "instagram_link", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Telefon", name: "phone", widget: "string"}
          - {label: "Copyright text", name: "copyright", widget: "string"}
          - {label: "Slogan", name: "slogan", widget: "string"}
